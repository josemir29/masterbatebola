<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MasterBateBola — Jogadores</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans:['"Plus Jakarta Sans"','sans-serif'],
        outfit:['Outfit','sans-serif'],
        bebas:['"Bebas Neue"','sans-serif'],
      },
      colors: {
        brand:{50:'#fff7ed',100:'#ffedd5',500:'#f15a24',600:'#d6491a'},
        dark:{900:'#0f172a',800:'#1e293b',700:'#334155'}
      }
    }
  }
}
</script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
input:focus,select:focus{outline:none;border-color:#f15a24;box-shadow:0 0 0 3px rgba(241,90,36,0.12)}
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.5);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#fff;border-radius:20px;padding:28px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
</style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen">

<!-- Header -->
<header class="bg-white border-b border-slate-100 sticky top-0 z-40">
  <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
    <div class="flex items-center gap-3">
      <a href="app.html" class="text-slate-400 hover:text-slate-600 transition-colors text-sm font-medium">← App</a>
      <div>
        <h1 class="font-outfit font-black text-lg text-dark-900 leading-none">Jogadores</h1>
        <p class="text-xs text-slate-400 mt-0.5" id="grupo-nome">carregando...</p>
      </div>
    </div>
    <button onclick="abrirModal()" 
      class="flex items-center gap-1.5 bg-brand-500 hover:bg-brand-600 text-white text-sm font-bold px-4 py-2 rounded-xl transition-all">
      + Adicionar
    </button>
  </div>
</header>

<!-- Filtro e busca -->
<div class="max-w-2xl mx-auto px-4 py-4">
  <div class="flex gap-2">
    <input type="text" id="busca" placeholder="Buscar jogador..."
      oninput="renderLista()"
      class="flex-1 px-4 py-2.5 rounded-xl border border-slate-200 bg-white text-sm transition-all placeholder:text-slate-300"/>
    <select id="filtro-pos" onchange="renderLista()"
      class="px-3 py-2.5 rounded-xl border border-slate-200 bg-white text-sm transition-all text-slate-600">
      <option value="">Todas posições</option>
      <option>Armador</option>
      <option>Ala</option>
      <option>Pivô</option>
    </select>
  </div>
</div>

<!-- Stats -->
<div class="max-w-2xl mx-auto px-4 mb-4">
  <div class="grid grid-cols-3 gap-3">
    <div class="bg-white rounded-2xl border border-slate-100 p-3 text-center">
      <div class="font-bebas text-3xl text-brand-500" id="stat-total">0</div>
      <div class="text-xs text-slate-400 font-medium">Total</div>
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 p-3 text-center">
      <div class="font-bebas text-3xl text-dark-900" id="stat-plano">12</div>
      <div class="text-xs text-slate-400 font-medium">Limite plano</div>
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 p-3 text-center">
      <div class="font-bebas text-3xl text-dark-900" id="stat-idade">—</div>
      <div class="text-xs text-slate-400 font-medium">Idade média</div>
    </div>
  </div>
</div>

<!-- Lista -->
<div class="max-w-2xl mx-auto px-4 pb-24">
  <div id="lista-jogadores" class="flex flex-col gap-2"></div>
  <div id="empty-state" class="hidden text-center py-16">
    <div class="text-4xl mb-3">🏀</div>
    <p class="font-outfit font-bold text-dark-900 text-lg mb-1">Nenhum jogador ainda</p>
    <p class="text-slate-400 text-sm mb-5">Adicione os associados do seu grupo</p>
    <button onclick="abrirModal()" class="bg-brand-500 text-white px-6 py-2.5 rounded-xl font-bold text-sm">
      + Adicionar primeiro jogador
    </button>
  </div>
</div>

<!-- Modal Adicionar/Editar -->
<div id="modal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="flex items-center justify-between mb-6">
      <h2 class="font-outfit font-black text-xl text-dark-900" id="modal-titulo">Novo jogador</h2>
      <button onclick="fecharModal()" class="text-slate-300 hover:text-slate-500 text-2xl leading-none">×</button>
    </div>

    <div id="modal-msg" class="hidden rounded-xl px-4 py-3 text-sm mb-4 font-medium"></div>

    <input type="hidden" id="edit-id"/>

    <div class="mb-4">
      <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5">Apelido *</label>
      <input type="text" id="f-apelido" placeholder="Ex: Panqueca, Kone, Fidel..."
        class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-sm transition-all placeholder:text-slate-300"/>
    </div>
    <div class="mb-4">
      <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5">Nome completo</label>
      <input type="text" id="f-nome" placeholder="Nome completo (opcional)"
        class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-sm transition-all placeholder:text-slate-300"/>
    </div>
    <div class="grid grid-cols-2 gap-3 mb-4">
      <div>
        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5">Posição</label>
        <select id="f-posicao"
          class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-sm transition-all">
          <option value="">Selecionar</option>
          <option>Armador</option>
          <option>Ala</option>
          <option>Pivô</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1.5">Data de nasc.</label>
        <input type="date" id="f-nascimento"
          class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-sm transition-all"/>
      </div>
    </div>

    <div class="flex gap-3 mt-6">
      <button onclick="fecharModal()"
        class="flex-1 py-3 border border-slate-200 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50 transition-all">
        Cancelar
      </button>
      <button onclick="salvarJogador()" id="btn-salvar"
        class="flex-1 py-3 bg-brand-500 hover:bg-brand-600 text-white font-bold rounded-xl text-sm transition-all">
        Salvar
      </button>
    </div>

    <!-- Botão deletar (só no edit) -->
    <button onclick="confirmarDelete()" id="btn-delete"
      class="hidden w-full mt-3 py-2.5 text-red-400 hover:text-red-600 text-sm font-semibold transition-colors">
      🗑 Remover jogador
    </button>
  </div>
</div>

<script>
const _SB_URL = 'https://cfcdwyxciflddccdxokw.supabase.co'
const _SB_KEY = 'sb_publishable_FSx4e9Os478sCRS7x2SCFA_dzqS1WUe'
const { createClient } = supabase
const sb = createClient(_SB_URL, _SB_KEY)

let _grupo = null
let _plano = 'free'
let _jogadores = []

// ── INIT ──────────────────────────────────────────────────────────────────
sb.auth.getSession().then(async ({ data }) => {
  if (!data.session) { window.location.href = 'auth.html'; return }
  
  const { data: grupos } = await sb.from('grupos').select('*').limit(1)
  if (!grupos || grupos.length === 0) { window.location.href = 'onboarding.html'; return }
  
  _grupo = grupos[0]
  _plano = grupos[0].plano || 'free'
  
  document.getElementById('grupo-nome').textContent = _grupo.nome
  document.getElementById('stat-plano').textContent = _plano === 'free' ? '12' : '∞'
  
  await carregarJogadores()
})

// ── CARREGAR ──────────────────────────────────────────────────────────────
async function carregarJogadores() {
  const { data, error } = await sb
    .from('jogadores')
    .select('*')
    .eq('grupo_id', _grupo.id)
    .order('apelido')

  if (error) { console.error(error); return }
  _jogadores = data || []
  renderLista()
  atualizarStats()
}

function atualizarStats() {
  document.getElementById('stat-total').textContent = _jogadores.length
  const comIdade = _jogadores.filter(j => j.data_nascimento)
  if (comIdade.length > 0) {
    const media = Math.round(comIdade.reduce((s,j) => s + calcAge(j.data_nascimento), 0) / comIdade.length)
    document.getElementById('stat-idade').textContent = media + 'a'
  }
}

function calcAge(dob) {
  if (!dob) return null
  const d = new Date(dob)
  const t = new Date()
  let a = t.getFullYear() - d.getFullYear()
  if (t.getMonth() < d.getMonth() || (t.getMonth() === d.getMonth() && t.getDate() < d.getDate())) a--
  return a
}

// ── RENDERIZAR LISTA ──────────────────────────────────────────────────────
function renderLista() {
  const busca = document.getElementById('busca').value.toLowerCase()
  const filtroPos = document.getElementById('filtro-pos').value

  let lista = _jogadores.filter(j => {
    const matchBusca = !busca || j.apelido.toLowerCase().includes(busca) || (j.nome_completo||'').toLowerCase().includes(busca)
    const matchPos = !filtroPos || j.posicao === filtroPos
    return matchBusca && matchPos
  })

  const container = document.getElementById('lista-jogadores')
  const empty = document.getElementById('empty-state')

  if (lista.length === 0 && _jogadores.length === 0) {
    container.innerHTML = ''
    empty.classList.remove('hidden')
    return
  }
  empty.classList.add('hidden')

  container.innerHTML = lista.map(j => {
    const idade = j.data_nascimento ? calcAge(j.data_nascimento) + 'a' : '—'
    const pos = j.posicao || '—'
    const iniciais = j.apelido.substring(0,2).toUpperCase()
    return `
    <div class="bg-white rounded-2xl border border-slate-100 px-4 py-3 flex items-center gap-3 cursor-pointer hover:border-brand-200 hover:bg-brand-50 transition-all"
      onclick="abrirModal('${j.id}')">
      <div class="w-10 h-10 rounded-xl bg-brand-50 border border-brand-100 flex items-center justify-center font-bebas text-brand-500 text-lg flex-shrink-0">
        ${iniciais}
      </div>
      <div class="flex-1 min-w-0">
        <div class="font-bold text-dark-900 text-sm">${j.apelido}</div>
        <div class="text-xs text-slate-400">${j.nome_completo || ''}</div>
      </div>
      <div class="text-right flex-shrink-0">
        <div class="text-xs font-bold text-slate-500">${pos}</div>
        <div class="text-xs text-slate-400">${idade}</div>
      </div>
      <div class="text-slate-300 text-lg">›</div>
    </div>`
  }).join('')
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function abrirModal(id = null) {
  // Verificar limite plano free
  if (!id && _plano === 'free' && _jogadores.length >= 12) {
    alert('Plano Grátis: limite de 12 jogadores.\nAssine o plano Associação para roster ilimitado.')
    window.location.href = 'planos.html?feature=roster'
    return
  }

  document.getElementById('modal').classList.remove('hidden')
  document.getElementById('modal-msg').classList.add('hidden')
  document.getElementById('edit-id').value = ''
  document.getElementById('f-apelido').value = ''
  document.getElementById('f-nome').value = ''
  document.getElementById('f-posicao').value = ''
  document.getElementById('f-nascimento').value = ''
  document.getElementById('btn-delete').classList.add('hidden')
  document.getElementById('btn-salvar').textContent = 'Salvar'

  if (id) {
    const j = _jogadores.find(x => x.id === id)
    if (!j) return
    document.getElementById('modal-titulo').textContent = 'Editar jogador'
    document.getElementById('edit-id').value = j.id
    document.getElementById('f-apelido').value = j.apelido || ''
    document.getElementById('f-nome').value = j.nome_completo || ''
    document.getElementById('f-posicao').value = j.posicao || ''
    document.getElementById('f-nascimento').value = j.data_nascimento || ''
    document.getElementById('btn-delete').classList.remove('hidden')
  } else {
    document.getElementById('modal-titulo').textContent = 'Novo jogador'
  }
}

function fecharModal() {
  document.getElementById('modal').classList.add('hidden')
}

// ── SALVAR ────────────────────────────────────────────────────────────────
async function salvarJogador() {
  const apelido = document.getElementById('f-apelido').value.trim()
  if (!apelido) return mostrarModalMsg('error', 'Apelido é obrigatório.')

  const btn = document.getElementById('btn-salvar')
  btn.disabled = true; btn.textContent = 'Salvando...'

  const payload = {
    grupo_id: _grupo.id,
    apelido,
    nome_completo: document.getElementById('f-nome').value.trim() || null,
    posicao: document.getElementById('f-posicao').value || null,
    data_nascimento: document.getElementById('f-nascimento').value || null,
  }

  const editId = document.getElementById('edit-id').value
  let error

  if (editId) {
    ({ error } = await sb.from('jogadores').update(payload).eq('id', editId))
  } else {
    ({ error } = await sb.from('jogadores').insert(payload))
  }

  if (error) {
    mostrarModalMsg('error', 'Erro: ' + error.message)
    btn.disabled = false; btn.textContent = 'Salvar'
  } else {
    fecharModal()
    await carregarJogadores()
  }
}

// ── DELETAR ───────────────────────────────────────────────────────────────
async function confirmarDelete() {
  const id = document.getElementById('edit-id').value
  const j = _jogadores.find(x => x.id === id)
  if (!j) return
  if (!confirm(`Remover "${j.apelido}" do roster?`)) return

  const { error } = await sb.from('jogadores').delete().eq('id', id)
  if (!error) {
    fecharModal()
    await carregarJogadores()
  }
}

function mostrarModalMsg(tipo, texto) {
  const el = document.getElementById('modal-msg')
  el.className = tipo === 'error'
    ? 'rounded-xl px-4 py-3 text-sm mb-4 font-medium bg-red-50 border border-red-200 text-red-600'
    : 'rounded-xl px-4 py-3 text-sm mb-4 font-medium bg-green-50 border border-green-200 text-green-700'
  el.textContent = texto
  el.classList.remove('hidden')
}

// Fechar modal clicando fora
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) fecharModal()
})
</script>
</body>
</html>
