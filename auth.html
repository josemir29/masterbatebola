<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MasterBateBola.app — Entrar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080808;color:#f8f8f6;font-family:'Barlow',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.card{background:#111;border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:40px 36px;width:100%;max-width:420px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;text-align:center;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:2px}
.ball{display:inline-block;width:22px;height:22px;background:#F97316;border-radius:50%;position:relative;overflow:hidden;top:-2px}
.ball::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 28%,rgba(0,0,0,0.22) 28%,rgba(0,0,0,0.22) 34%)}
.ball::after{content:'';position:absolute;top:46%;left:-6%;right:-6%;height:9%;background:rgba(0,0,0,0.22);transform:rotate(-8deg);display:block}
.subtitle{text-align:center;font-size:14px;color:#555;margin-bottom:32px}
.tabs{display:flex;gap:4px;background:#1a1a1a;border-radius:10px;padding:4px;margin-bottom:28px}
.tab{flex:1;padding:9px;border:none;background:transparent;color:#555;font-family:'Barlow',sans-serif;font-weight:600;font-size:14px;cursor:pointer;border-radius:7px;transition:all .15s}
.tab.active{background:#F97316;color:#fff}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
.field input{width:100%;padding:12px 14px;background:#1a1a1a;border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:#f8f8f6;font-family:'Barlow',sans-serif;font-size:15px;outline:none;transition:border-color .15s}
.field input:focus{border-color:#F97316}
.field input::placeholder{color:#333}
.btn-main{width:100%;padding:14px;background:#F97316;border:none;border-radius:10px;color:#fff;font-family:'Barlow',sans-serif;font-weight:700;font-size:16px;cursor:pointer;transition:background .15s;margin-top:4px}
.btn-main:hover{background:#EA580C}
.btn-main:disabled{background:#333;color:#555;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#333;font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.06)}
.btn-google{width:100%;padding:13px;background:#1a1a1a;border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#f8f8f6;font-family:'Barlow',sans-serif;font-weight:600;font-size:15px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-google:hover{border-color:rgba(255,255,255,0.25);background:#222}
.google-icon{width:18px;height:18px;flex-shrink:0}
.msg{padding:12px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
.msg.error{background:rgba(220,38,38,0.1);border:1px solid rgba(220,38,38,0.3);color:#f87171}
.msg.success{background:rgba(22,163,74,0.1);border:1px solid rgba(22,163,74,0.3);color:#4ade80}
.form-section{display:none}
.form-section.active{display:block}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <span>MASTERBATEB</span>
    <span class="ball"></span>
    <span>LA</span>
  </div>
  <div class="subtitle">Gestão de bate-bola de basquete master</div>

  <div class="tabs">
    <button class="tab active" onclick="setTab('login')">Entrar</button>
    <button class="tab" onclick="setTab('cadastro')">Criar conta</button>
  </div>

  <div id="msg" class="msg"></div>

  <!-- LOGIN -->
  <div id="form-login" class="form-section active">
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="seu@email.com"/>
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="login-senha" placeholder="••••••••" onkeydown="if(event.key==='Enter')fazerLogin()"/>
    </div>
    <button class="btn-main" id="btn-login" onclick="fazerLogin()">Entrar</button>
    <div class="divider">ou</div>
    <button class="btn-google" onclick="loginGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Entrar com Google
    </button>
  </div>

  <!-- CADASTRO -->
  <div id="form-cadastro" class="form-section">
    <div class="field">
      <label>Nome</label>
      <input type="text" id="cad-nome" placeholder="Seu nome"/>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="cad-email" placeholder="seu@email.com"/>
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="cad-senha" placeholder="mínimo 6 caracteres" onkeydown="if(event.key==='Enter')fazerCadastro()"/>
    </div>
    <button class="btn-main" id="btn-cadastro" onclick="fazerCadastro()">Criar conta grátis</button>
    <div class="divider">ou</div>
    <button class="btn-google" onclick="loginGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Cadastrar com Google
    </button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://cfcdwyxciflddccdxokw.supabase.co'
const SUPABASE_KEY = 'sb_publishable_FSx4e9Os478sCRS7x2SCFA_dzqS1WUe'
const { createClient } = supabase
const sb = createClient(SUPABASE_URL, SUPABASE_KEY)

// Verificar se já está logado
sb.auth.getSession().then(({ data }) => {
  if (data.session) redirecionarAposLogin()
})

// Ouvir callback do OAuth (Google)
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session) redirecionarAposLogin()
})

async function redirecionarAposLogin() {
  // Verificar se já tem grupo cadastrado
  const { data } = await sb.from('grupos').select('id').limit(1)
  if (data && data.length > 0) {
    window.location.href = 'app.html'
  } else {
    window.location.href = 'onboarding.html'
  }
}

function setTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['login','cadastro'][i] === tab))
  document.querySelectorAll('.form-section').forEach((f,i) => f.classList.toggle('active', ['form-login','form-cadastro'][i] === 'form-'+tab))
  esconderMsg()
}

function mostrarMsg(tipo, texto) {
  const el = document.getElementById('msg')
  el.className = 'msg ' + tipo
  el.textContent = texto
  el.style.display = 'block'
}

function esconderMsg() {
  document.getElementById('msg').style.display = 'none'
}

async function fazerLogin() {
  const email = document.getElementById('login-email').value.trim()
  const senha = document.getElementById('login-senha').value
  if (!email || !senha) return mostrarMsg('error', 'Preencha email e senha.')
  const btn = document.getElementById('btn-login')
  btn.disabled = true; btn.textContent = 'Entrando...'
  const { error } = await sb.auth.signInWithPassword({ email, password: senha })
  if (error) {
    mostrarMsg('error', error.message === 'Invalid login credentials' ? 'Email ou senha incorretos.' : error.message)
    btn.disabled = false; btn.textContent = 'Entrar'
  }
}

async function fazerCadastro() {
  const nome  = document.getElementById('cad-nome').value.trim()
  const email = document.getElementById('cad-email').value.trim()
  const senha = document.getElementById('cad-senha').value
  if (!nome || !email || !senha) return mostrarMsg('error', 'Preencha todos os campos.')
  if (senha.length < 6) return mostrarMsg('error', 'Senha precisa ter pelo menos 6 caracteres.')
  const btn = document.getElementById('btn-cadastro')
  btn.disabled = true; btn.textContent = 'Criando conta...'
  const { error } = await sb.auth.signUp({
    email, password: senha,
    options: { data: { nome_completo: nome } }
  })
  if (error) {
    mostrarMsg('error', error.message)
    btn.disabled = false; btn.textContent = 'Criar conta grátis'
  } else {
    mostrarMsg('success', '✓ Conta criada! Verifique seu email para confirmar.')
    btn.disabled = false; btn.textContent = 'Criar conta grátis'
  }
}

async function loginGoogle() {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/masterbatebola/onboarding.html' }
  })
}
</script>
</body>
</html>
