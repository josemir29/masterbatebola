<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MasterBateBola.app — Entrar</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
        outfit: ['Outfit', 'sans-serif'],
        bebas: ['"Bebas Neue"', 'sans-serif'],
      },
      colors: {
        brand: {
          50: '#fff7ed', 100: '#ffedd5',
          500: '#f15a24', 600: '#d6491a', 900: '#7c2d12',
        },
        dark: { 900: '#0f172a', 800: '#1e293b', 700: '#334155' }
      },
      boxShadow: {
        soft: '0 20px 40px -15px rgba(0,0,0,0.08)',
        glow: '0 0 40px -10px rgba(241,90,36,0.3)',
      }
    }
  }
}
</script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
.css-ball{display:inline-block;background:#f15a24;border-radius:50%;position:relative;overflow:hidden;flex-shrink:0;vertical-align:middle}
.css-ball::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 28%,rgba(0,0,0,0.22) 28%,rgba(0,0,0,0.22) 34%)}
.css-ball::after{content:'';position:absolute;top:46%;left:-6%;right:-6%;height:9%;background:rgba(0,0,0,0.22);transform:rotate(-8deg)}
.bg-orb-1{position:fixed;top:-10%;left:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(241,90,36,0.12) 0%,rgba(255,255,255,0) 70%);border-radius:50%;filter:blur(60px);z-index:0;pointer-events:none}
.bg-orb-2{position:fixed;bottom:-10%;right:-5%;width:500px;height:500px;background:radial-gradient(circle,rgba(59,130,246,0.08) 0%,rgba(255,255,255,0) 70%);border-radius:50%;filter:blur(80px);z-index:0;pointer-events:none}
input:focus{outline:none;border-color:#f15a24;box-shadow:0 0 0 3px rgba(241,90,36,0.12)}
</style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex items-center justify-center p-6">

<div class="bg-orb-1"></div>
<div class="bg-orb-2"></div>

<div class="relative z-10 w-full max-w-md">

  <!-- Logo -->
  <div class="text-center mb-8">
    <a href="index.html" class="inline-flex flex-col items-center gap-1 hover:opacity-80 transition-opacity">
      <img src="https://masterbatebola.app.br/logo-preta.png" alt="MasterBateBola.app" class="h-16 w-auto mx-auto"/>
    </a>
    <p class="text-slate-500 text-sm mt-3">Gestão de bate-bola de basquete master</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-3xl shadow-soft border border-slate-100 p-8">

    <!-- Tabs -->
    <div class="flex bg-slate-100 rounded-2xl p-1 mb-8">
      <button id="tab-login" onclick="setTab('login')"
        class="flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all bg-white shadow-sm text-dark-900">
        Entrar
      </button>
      <button id="tab-cadastro" onclick="setTab('cadastro')"
        class="flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all text-slate-500">
        Criar conta
      </button>
    </div>

    <!-- Mensagem -->
    <div id="msg" class="hidden rounded-xl px-4 py-3 text-sm mb-6 font-medium"></div>

    <!-- LOGIN -->
    <div id="form-login">
      <div class="mb-5">
        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Email</label>
        <input type="email" id="login-email" placeholder="seu@email.com"
          class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-dark-900 text-sm transition-all placeholder:text-slate-300"/>
      </div>
      <div class="mb-6">
        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Senha</label>
        <input type="password" id="login-senha" placeholder="••••••••"
          class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-dark-900 text-sm transition-all placeholder:text-slate-300"
          onkeydown="if(event.key==='Enter')fazerLogin()"/>
      </div>
      <button onclick="fazerLogin()" id="btn-login"
        class="w-full py-3.5 bg-brand-500 hover:bg-brand-600 text-white font-bold rounded-xl transition-all text-sm shadow-glow hover:shadow-none hover:translate-y-0.5">
        Entrar
      </button>
      <div class="flex items-center gap-3 my-5 text-slate-300 text-xs">
        <div class="flex-1 h-px bg-slate-100"></div>ou<div class="flex-1 h-px bg-slate-100"></div>
      </div>
      <button onclick="loginGoogle()"
        class="w-full py-3 border border-slate-200 rounded-xl text-sm font-semibold text-slate-700 hover:bg-slate-50 transition-all flex items-center justify-center gap-2.5">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continuar com Google
      </button>
    </div>

    <!-- CADASTRO -->
    <div id="form-cadastro" class="hidden">
      <div class="mb-4">
        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Nome</label>
        <input type="text" id="cad-nome" placeholder="Seu nome"
          class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-dark-900 text-sm transition-all placeholder:text-slate-300"/>
      </div>
      <div class="mb-4">
        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Email</label>
        <input type="email" id="cad-email" placeholder="seu@email.com"
          class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-dark-900 text-sm transition-all placeholder:text-slate-300"/>
      </div>
      <div class="mb-6">
        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Senha</label>
        <input type="password" id="cad-senha" placeholder="mínimo 6 caracteres"
          class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-dark-900 text-sm transition-all placeholder:text-slate-300"
          onkeydown="if(event.key==='Enter')fazerCadastro()"/>
      </div>
      <button onclick="fazerCadastro()" id="btn-cadastro"
        class="w-full py-3.5 bg-brand-500 hover:bg-brand-600 text-white font-bold rounded-xl transition-all text-sm shadow-glow hover:shadow-none hover:translate-y-0.5">
        Criar conta grátis
      </button>
      <div class="flex items-center gap-3 my-5 text-slate-300 text-xs">
        <div class="flex-1 h-px bg-slate-100"></div>ou<div class="flex-1 h-px bg-slate-100"></div>
      </div>
      <button onclick="loginGoogle()"
        class="w-full py-3 border border-slate-200 rounded-xl text-sm font-semibold text-slate-700 hover:bg-slate-50 transition-all flex items-center justify-center gap-2.5">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Cadastrar com Google
      </button>
    </div>

  </div>

  <p class="text-center text-xs text-slate-400 mt-6">
    Ao continuar você concorda com os <a href="#" class="text-brand-500 hover:underline">termos de uso</a>
  </p>
</div>

<script>
const SUPABASE_URL = 'https://cfcdwyxciflddccdxokw.supabase.co'
const SUPABASE_KEY = 'sb_publishable_FSx4e9Os478sCRS7x2SCFA_dzqS1WUe'
const { createClient } = supabase
const sb = createClient(SUPABASE_URL, SUPABASE_KEY)

sb.auth.getSession().then(({ data }) => {
  if (data.session) redirecionarAposLogin()
})
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session) redirecionarAposLogin()
})

async function redirecionarAposLogin() {
  const { data: grupos } = await sb.from('grupos').select('id,plano').limit(1)
  if (!grupos || grupos.length === 0) {
    // Novo usuário: escolhe plano primeiro
    window.location.href = 'planos.html'
  } else if (!grupos[0].plano || grupos[0].plano === '') {
    // Tem grupo mas sem plano definido: vai para planos
    window.location.href = 'planos.html'
  } else {
    // Já tem grupo e plano: vai direto pro app
    window.location.href = 'app.html'
  }
}

function setTab(tab) {
  const isLogin = tab === 'login'
  document.getElementById('tab-login').className = `flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all ${isLogin ? 'bg-white shadow-sm text-dark-900' : 'text-slate-500'}`
  document.getElementById('tab-cadastro').className = `flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all ${!isLogin ? 'bg-white shadow-sm text-dark-900' : 'text-slate-500'}`
  document.getElementById('form-login').classList.toggle('hidden', !isLogin)
  document.getElementById('form-cadastro').classList.toggle('hidden', isLogin)
  esconderMsg()
}

function mostrarMsg(tipo, texto) {
  const el = document.getElementById('msg')
  el.className = tipo === 'error'
    ? 'rounded-xl px-4 py-3 text-sm mb-6 font-medium bg-red-50 border border-red-200 text-red-600'
    : 'rounded-xl px-4 py-3 text-sm mb-6 font-medium bg-green-50 border border-green-200 text-green-700'
  el.textContent = texto
  el.classList.remove('hidden')
}
function esconderMsg() { document.getElementById('msg').classList.add('hidden') }

async function fazerLogin() {
  const email = document.getElementById('login-email').value.trim()
  const senha = document.getElementById('login-senha').value
  if (!email || !senha) return mostrarMsg('error', 'Preencha email e senha.')
  const btn = document.getElementById('btn-login')
  btn.disabled = true; btn.textContent = 'Entrando...'
  const { error } = await sb.auth.signInWithPassword({ email, password: senha })
  if (error) {
    mostrarMsg('error', error.message === 'Invalid login credentials' ? 'Email ou senha incorretos.' : error.message)
    btn.disabled = false; btn.textContent = 'Entrar'
  }
}

async function fazerCadastro() {
  const nome  = document.getElementById('cad-nome').value.trim()
  const email = document.getElementById('cad-email').value.trim()
  const senha = document.getElementById('cad-senha').value
  if (!nome || !email || !senha) return mostrarMsg('error', 'Preencha todos os campos.')
  if (senha.length < 6) return mostrarMsg('error', 'Senha precisa ter pelo menos 6 caracteres.')
  const btn = document.getElementById('btn-cadastro')
  btn.disabled = true; btn.textContent = 'Criando conta...'
  const { error } = await sb.auth.signUp({ email, password: senha, options: { data: { nome_completo: nome } } })
  if (error) {
    mostrarMsg('error', error.message)
  } else {
    mostrarMsg('success', '✓ Conta criada! Verifique seu email para confirmar.')
  }
  btn.disabled = false; btn.textContent = 'Criar conta grátis'
}

async function loginGoogle() {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/onboarding.html' }
  })
}
</script>
</body>
</html>
