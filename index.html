<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>MasterBateBola.app</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
body{background:#080808;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif}
.loader{text-align:center;color:#F97316}
.logo{font-family:monospace;font-size:24px;letter-spacing:3px;margin-bottom:16px}
.spinner{width:32px;height:32px;border:3px solid rgba(249,115,22,0.2);border-top-color:#F97316;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loader">
  <div class="logo">MASTERBATEBOLA</div>
  <div class="spinner"></div>
</div>
<script>
const { createClient } = supabase
const sb = createClient(
  'https://cfcdwyxciflddccdxokw.supabase.co',
  'sb_publishable_FSx4e9Os478sCRS7x2SCFA_dzqS1WUe'
)
sb.auth.getSession().then(async ({ data }) => {
  if (!data.session) {
    window.location.href = 'auth.html'
    return
  }
  const { data: grupos } = await sb.from('grupos').select('id').limit(1)
  if (!grupos || grupos.length === 0) {
    window.location.href = 'onboarding.html'
  } else {
    window.location.href = 'app.html'
  }
})
</script>
</body>
</html>
